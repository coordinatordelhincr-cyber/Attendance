<!DOCTYPE html>
<html>
<head>
  <title>Delhi Attendance Systemm</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f4f6f9;
    }
    .fallback-bar {
      background: #007bff;
      color: white;
      text-align: center;
      padding: 10px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      position: relative;
      z-index: 10;
    }
    .fallback-bar a {
      color: #fff;
      text-decoration: underline;
      margin-left: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <!-- Top bar for users whose browsers block the iframe -->
  <div class="fallback-bar">
    Facing issues loading? 
    <a href="https://script.google.com/macros/s/AKfycbzIlxhBiLdCWN8Cw4BOlb-SWOmP1XBpN6PZCC7wgbCm94lKEuVRnbpKowOElDi6F5U3ag/exec" target="_blank">
      👉 Click here to Open Direct
    </a>
  </div>

  <iframe 
    id="app-frame"
    src="https://script.google.com/macros/s/AKfycbzIlxhBiLdCWN8Cw4BOlb-SWOmP1XBpN6PZCC7wgbCm94lKEuVRnbpKowOElDi6F5U3ag/exec"
    width="100%"
    height="calc(100% - 44px)"
    frameborder="0"
    scrolling="yes"
    allow="geolocation https://script.google.com https://*.googleusercontent.com; microphone; camera"
    style="position: fixed; top: 44px; left: 0; width: 100%; border: none;">
  </iframe>

  <script>
    window.onload = function() {
       var iframe = document.getElementById('app-frame');
       if(iframe) { iframe.focus(); }
    };
  </script>
</body>
</html>
